name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install Linux sandbox runtime
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      # Ubuntu 24.04's AppArmor policy blocks unprivileged user namespaces even
      # on GitHub's disposable runner. Open only that runner-local switch so the
      # following probe and bwrap-real integration test exercise real isolation.
      - name: Allow bubblewrap user namespaces on the CI runner
        run: |
          if [[ -e /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi

      - name: Prove bubblewrap namespaces work
        run: bwrap --unshare-user --unshare-pid --ro-bind / / --dev /dev --proc /proc -- true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      # Build BEFORE the suite so tests/integration/binary.test.ts cannot silently
      # skip because dist/reviewgate is absent. `bun test` then covers unit,
      # deterministic integration and the real bwrap isolation test; credentialed
      # provider E2E remains explicitly opt-in.
      - name: Build host binary
        run: bun run build

      - name: Full deterministic suite
        run: bun test

  package-native:
    name: Package + native smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install Node/npm consumer runtime
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and smoke the native binary
        run: |
          bun run build
          bun test tests/integration/binary.test.ts

      # Packs the main package + this runner's platform package, installs them in
      # a fresh npm consumer project, executes the launcher/binary, and verifies
      # that `reviewgate init` bakes the installed platform binary path.
      - name: npm install end-to-end
        env:
          RG_E2E: "1"
        run: bun test tests/integration/npm-install-e2e.test.ts
