name: Release

# Cut a release: push a tag like `v0.1.0-alpha.1` (matched by `v*`). This builds a
# self-contained tarball per platform and attaches them to the GitHub Release.
#
# Why tarballs, not a bare binary: `bun --compile` does NOT embed the tree-sitter
# `.wasm` grammars (the symbol-graph feature reads them at runtime), and the gate
# also ships `bin-templates/` + `personas/`. So each asset is a folder —
# `reviewgate` binary + `grammars/` + `bin-templates/` + `personas/` — gzipped.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release + upload assets (first-party GITHUB_TOKEN)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Gate the release on the same checks as CI — never ship a binary that fails
      # its own suite (this is, after all, a review gate).
      - name: Verify (typecheck · lint · unit tests)
        run: |
          bun run typecheck
          bun run lint
          bun test tests/unit

      - name: Build per-platform tarballs
        env:
          NODE_ENV: production
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          # bun cross-compile target  ->  released os-arch name (all built from this one runner)
          targets="bun-darwin-arm64:darwin-arm64 bun-darwin-x64:darwin-x64 bun-linux-x64:linux-x64 bun-linux-arm64:linux-arm64"
          for pair in $targets; do
            bunt="${pair%%:*}"; name="${pair##*:}"
            out="reviewgate-${TAG}-${name}"
            echo "::group::build ${name}"
            mkdir -p "dist-rel/${out}/grammars" "dist-rel/${out}/bin-templates"
            bun build src/cli/index.ts --compile --target="${bunt}" --outfile "dist-rel/${out}/reviewgate"
            cp node_modules/web-tree-sitter/web-tree-sitter.wasm \
               node_modules/tree-sitter-typescript/*.wasm \
               node_modules/tree-sitter-python/*.wasm \
               "dist-rel/${out}/grammars/"
            cp bin-templates/*.sh "dist-rel/${out}/bin-templates/" || true
            cp -r src/personas "dist-rel/${out}/personas" || true
            tar -C dist-rel -czf "${out}.tar.gz" "${out}"
            sha256sum "${out}.tar.gz" >> SHA256SUMS.txt
            echo "::endgroup::"
          done
          echo "--- SHA256SUMS ---"; cat SHA256SUMS.txt

      - name: Create / update the Release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          # Pre-1.0 / alpha / beta / rc tags are marked as a pre-release.
          prerelease=""
          case "$TAG" in
            *alpha*|*beta*|*rc*|v0.*) prerelease="--prerelease" ;;
          esac
          # Idempotent: create the release only if it doesn't exist yet (re-runs just re-upload).
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TAG" --generate-notes --verify-tag $prerelease
          gh release upload "$TAG" reviewgate-*.tar.gz SHA256SUMS.txt --clobber

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    # Auth via npm Trusted Publishing (OIDC) — NO long-lived NPM_TOKEN. npm (>= 11.5)
    # mints a short-lived, per-run credential from the GitHub OIDC identity, which
    # npmjs.com trusts for these packages (configured per-package on npmjs.com:
    # publisher = GitHub Actions, repo Codevena/reviewgate, workflow release.yml).
    # Forks are skipped by the repo check; a fork's OIDC identity wouldn't match the
    # trusted publisher anyway, so npm would reject it.
    if: ${{ github.repository == 'Codevena/reviewgate' }}
    permissions:
      contents: read
      id-token: write # REQUIRED: lets npm do the OIDC trusted-publishing handshake (+ provenance)
    steps:
      - uses: actions/checkout@v5

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # NO registry-url: setup-node's registry-url writes an .npmrc line
      # `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}` — with no NODE_AUTH_TOKEN
      # set (we use OIDC, not a token) npm aborts publish with "Failed to replace env
      # in config: ${NODE_AUTH_TOKEN}". npm publishes to the default registry
      # (registry.npmjs.org) anyway, and OIDC Trusted Publishing handles auth.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # node 20 ships npm 10.x; Trusted Publishing (OIDC) needs npm >= 11.5. Pin an exact,
      # audited version — `@latest` would fetch+exec an unaudited binary inside this
      # id-token:write job (it can read the OIDC request token), a supply-chain risk.
      - name: Upgrade npm (pinned; >= 11.5 for OIDC Trusted Publishing)
        run: npm install -g npm@11.17.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build + verify npm-dist (version from tag)
        env:
          REVIEWGATE_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # strip the leading 'v' from the tag for the package version
          export REVIEWGATE_VERSION="${REVIEWGATE_VERSION#v}"
          # fail if the committed root version disagrees with the tag (no drift)
          root_ver="$(node -e "process.stdout.write(require('./package.json').version)")"
          if [ "${root_ver}" != "${REVIEWGATE_VERSION}" ]; then
            echo "version drift: package.json ${root_ver} != tag ${REVIEWGATE_VERSION}"; exit 1
          fi
          bun run build:npm
          bun run verify:npm

      - name: Publish via OIDC Trusted Publishing (platform packages first, then main; idempotent)
        run: |
          set -euo pipefail
          # No NODE_AUTH_TOKEN: npm >= 11.5 detects the OIDC environment + the per-package
          # trusted-publisher config and authenticates per run (provenance is generated too).
          # Idempotent publish — a re-pushed tag / partial-publish re-run must SKIP versions that
          # already exist (npm versions are immutable) instead of aborting. We rely on the
          # AUTHORITATIVE write-path response (the 403 "cannot publish over previously published"),
          # NOT `npm view`: the registry's CDN has read-after-write lag, so `npm view pkg@newver`
          # can report "not found" minutes after a successful publish → a false re-publish → 403.
          # "./$d" (not "$d"): a bare "owner/repo"-shaped path like "npm-dist/main" is parsed by npm
          # as a GitHub-shorthand git dep (→ git ls-remote, fails); "./" forces a local-directory read.
          publish_idem() {
            d="$1"
            if out="$(npm publish "./$d" --access public --provenance 2>&1)"; then
              printf '%s\n' "$out"
            elif printf '%s\n' "$out" | grep -qiE "cannot publish over|previously published"; then
              echo "skip: ./$d — this version is already published (idempotent)"
            else
              printf '%s\n' "$out" >&2
              return 1
            fi
          }
          # Platform packages MUST go first — main pins them exactly and would otherwise
          # reference versions that don't exist yet.
          for d in npm-dist/@codevena/*; do publish_idem "$d"; done
          publish_idem npm-dist/main
